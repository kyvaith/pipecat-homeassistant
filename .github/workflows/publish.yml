name: Publish add-on image

on:
  release:
    types:
      - published
  push:
    tags:
      - "v*"

env:
  ARCHITECTURES: '["amd64", "aarch64"]'
  IMAGE_NAME: pipecat-assist
  LEGACY_AMD64_IMAGE_NAME: pipecat-assist-legacy-amd64
  REGISTRY_PREFIX: ghcr.io/${{ github.repository }}

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  init:
    name: Initialize
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - name: Prepare build matrix
        id: matrix
        uses: home-assistant/builder/actions/prepare-multi-arch-matrix@2026.06.0
        with:
          architectures: ${{ env.ARCHITECTURES }}
          image-name: ${{ env.IMAGE_NAME }}
          registry-prefix: ${{ env.REGISTRY_PREFIX }}

  build:
    name: Build ${{ matrix.arch }}
    needs: init
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.init.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6
      - name: Prepare release tags
        id: release
        shell: bash
        run: |
          release_tag="${GITHUB_REF_NAME}"
          if [[ "${{ github.event_name }}" == "release" ]]; then
            release_tag="${{ github.event.release.tag_name }}"
          fi
          app_version="${release_tag#v}"

          {
            echo "image_tags<<EOF"
            echo "${release_tag}"
            if [[ "${app_version}" != "${release_tag}" ]]; then
              echo "${app_version}"
            fi
            echo "latest"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"
          echo "app_version=${app_version}" >> "${GITHUB_OUTPUT}"
      - name: Build and push image
        uses: home-assistant/builder/actions/build-image@2026.06.0
        with:
          arch: ${{ matrix.arch }}
          build-args: |
            BUILD_FROM=ghcr.io/home-assistant/${{ matrix.arch }}-base-debian:bookworm
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          context: addons/pipecat_assist
          cosign: "true"
          image: ${{ matrix.image }}
          image-tags: ${{ steps.release.outputs.image_tags }}
          push: "true"
          version: ${{ steps.release.outputs.app_version }}

  manifest:
    name: Publish manifest
    needs:
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Prepare release tags
        id: release
        shell: bash
        run: |
          release_tag="${GITHUB_REF_NAME}"
          if [[ "${{ github.event_name }}" == "release" ]]; then
            release_tag="${{ github.event.release.tag_name }}"
          fi
          app_version="${release_tag#v}"

          {
            echo "image_tags<<EOF"
            echo "${release_tag}"
            if [[ "${app_version}" != "${release_tag}" ]]; then
              echo "${app_version}"
            fi
            echo "latest"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"
      - name: Publish multi-arch manifest
        uses: home-assistant/builder/actions/publish-multi-arch-manifest@2026.06.0
        with:
          architectures: ${{ env.ARCHITECTURES }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          image-name: ${{ env.IMAGE_NAME }}
          image-tags: ${{ steps.release.outputs.image_tags }}
          registry-prefix: ${{ env.REGISTRY_PREFIX }}

  legacy-amd64:
    name: Build legacy amd64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Prepare release tags
        id: release
        shell: bash
        run: |
          release_tag="${GITHUB_REF_NAME}"
          if [[ "${{ github.event_name }}" == "release" ]]; then
            release_tag="${{ github.event.release.tag_name }}"
          fi
          app_version="${release_tag#v}"

          {
            echo "image_tags<<EOF"
            echo "${release_tag}"
            if [[ "${app_version}" != "${release_tag}" ]]; then
              echo "${app_version}"
            fi
            echo "latest"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"
          echo "app_version=${app_version}" >> "${GITHUB_OUTPUT}"
      - name: Build and push legacy amd64 image
        uses: home-assistant/builder/actions/build-image@2026.06.0
        with:
          arch: amd64
          build-args: |
            BUILD_FROM=ghcr.io/home-assistant/amd64-base-debian:bookworm
            LEGACY_AMD64_NUMPY=true
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          context: addons/pipecat_assist
          cosign: "true"
          image: ${{ env.REGISTRY_PREFIX }}/${{ env.LEGACY_AMD64_IMAGE_NAME }}
          image-tags: ${{ steps.release.outputs.image_tags }}
          push: "true"
          version: ${{ steps.release.outputs.app_version }}

  github-release:
    name: Publish GitHub release
    needs:
      - manifest
      - legacy-amd64
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release edit "${TAG_NAME}" --latest
          else
            gh release create "${TAG_NAME}" \
              --title "${TAG_NAME}" \
              --generate-notes \
              --latest
          fi
