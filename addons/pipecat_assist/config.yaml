name: Pipecat Assist
version: "0.1.18"
slug: pipecat_assist
description: Realtime Pipecat assistant for Home Assistant with MCP device control and ESP32 satellite support.
url: https://github.com/kyvaith/pipecat-homeassistant
image: ghcr.io/kyvaith/pipecat-homeassistant/pipecat-assist
arch:
  - aarch64
  - amd64
init: false
startup: application
boot: auto
host_network: true
ingress: true
ingress_port: 7860
panel_icon: mdi:account-voice
homeassistant_api: true
options:
  esp32_mode: false
  runner_port: 7860
  log_level: "INFO"
schema:
  esp32_mode: bool
  runner_port: port
  log_level: list(DEBUG|INFO|WARNING|ERROR)
